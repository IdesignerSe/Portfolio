<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #ffffff;
        color: #111;
      }

      .hero {
        width: 100%;
        height: 100vh;
        background-image: url("/images/hero.jpg");
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hero-title {
        background: rgba(0, 0, 0, 0.5);
        padding: 20px 40px;
        border-radius: 8px;
        color: white;
        font-size: 3rem;
        font-weight: bold;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- Static hero section before React loads -->
    <section class="hero">
      <h1 class="hero-title">Welcome to My Portfolio</h1>
    </section>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
