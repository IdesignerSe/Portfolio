<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heb Portfolio</title>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- TOP NAV -->
    <header id="top-menu">
        <button onclick="scrollToSection('projects')">Projects</button>
        <button onclick="scrollToSection('cv')">Classic CV</button>
        <button onclick="scrollToSection('contact')">Contact</button>
    </header>

    <!-- HERO SECTION -->
    <section id="hero">

        <!-- LEFT SIDE TEXT -->
        <div class="hero-text">
            <h1>Heb</h1>
            <h2>Software Development Student</h2>

            <p class="value">
                Building clean, structured C#/.NET and Frontend projects with a designer’s eye.
            </p>

            <div class="hero-buttons">
                <button onclick="scrollToSection('projects')">View Projects</button>
                <button onclick="scrollToSection('cv')">View Classic CV</button>
            </div>

            <div class="socials">
                <a href="https://github.com/" target="_blank">GitHub</a>
                <a href="https://linkedin.com/" target="_blank">LinkedIn</a>
                <a href="mailto:your@email.com">Email</a>
            </div>
        </div>

        <!-- RIGHT SIDE 3D CANVAS -->
        <div class="hero-3d">
            <canvas id="three-canvas"></canvas>
            <div id="brand-blink">IdesignerSe</div>
        </div>

    </section>

    <!-- PROJECTS SECTION -->
    <section id="projects">
        <h2>Projects</h2>
        <p>Coming soon...</p>
    </section>

    <!-- CV SECTION -->
    <section id="cv">
        <h2>Classic CV</h2>
        <p>Coming soon...</p>
    </section>

    <!-- CONTACT SECTION -->
    <section id="contact">
        <h2>Contact</h2>
        <p>Email: your@email.com</p>
    </section>

    <!-- SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
    <script src="main.js"></script>
    <script src="three-scene.js"></script>

</body>
</html>
